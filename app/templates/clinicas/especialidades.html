{% extends "base_portal.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header bg-primary text-white fw-bold"><i class="fas fa-stethoscope me-2"></i>Nova Especialidade</div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('clinicas.listar_especialidades') }}">
                        <div class="mb-3">
                            <label>Nome *</label>
                            <input type="text" name="nome" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Descrição</label>
                            <textarea name="descricao" class="form-control" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Salvar</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Especialidade</th>
                                <th class="text-end pe-4">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for e in especialidades %}
                            <tr>
                                <td class="ps-4">
                                    <span class="fw-bold text-dark">{{ e.nome }}</span><br>
                                    <small class="text-muted">{{ e.descricao or 'Sem descrição' }}</small>
                                </td>
                                <td class="text-end pe-4">
                                    <button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#editModal{{ e.id }}">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    
                                    <form action="{{ url_for('clinicas.excluir_especialidade', id=e.id) }}" method="POST" class="d-inline" onsubmit="return confirm('Excluir especialidade?');">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                                    </form>
                                </td>
                            </tr>

                            <div class="modal fade" id="editModal{{ e.id }}" tabindex="-1">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <h5 class="modal-title">Editar Especialidade</h5>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                        </div>
                                        <form method="POST" action="{{ url_for('clinicas.editar_especialidade', id=e.id) }}">
                                            <div class="modal-body text-start">
                                                <div class="mb-3">
                                                    <label>Nome</label>
                                                    <input type="text" name="nome" class="form-control" value="{{ e.nome }}" required>
                                                </div>
                                                <div class="mb-3">
                                                    <label>Descrição</label>
                                                    <textarea name="descricao" class="form-control" rows="3">{{ e.descricao }}</textarea>
                                                </div>
                                            </div>
                                            <div class="modal-footer">
                                                <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
