<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acesso Paciente - SindiMedic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f4f8; font-family: system-ui, -apple-system, sans-serif; }
        .login-card { border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100 pb-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
            
            <div class="text-center mb-4">
                <i class="fas fa-heartbeat fa-3x text-primary mb-2"></i>
                <h3 class="fw-bold text-dark mb-0">SindiMedic Saúde</h3>
                <p class="text-muted small">Portal do Beneficiário</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} rounded-3 shadow-sm border-0 small">
                            <i class="fas fa-info-circle me-1"></i> {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <div class="card login-card border-0">
                <div class="card-body p-4 p-md-5">
                    <form method="POST">
                        <div class="mb-4">
                            <label class="form-label fw-bold text-secondary small">Seu CPF</label>
                            <input type="text" id="cpf" name="cpf" class="form-control form-control-lg bg-light border-0" 
                                   placeholder="000.000.000-00" inputmode="numeric" required>
                        </div>
                        
                        <div class="mb-5">
                            <label class="form-label fw-bold text-secondary small">Data de Nascimento</label>
                            <input type="date" name="data_nascimento" class="form-control form-control-lg bg-light border-0" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold rounded-pill shadow-sm">
                            Acessar Carteirinha <i class="fas fa-arrow-right ms-2"></i>
                        </button>
                    </form>
                </div>
            </div>
            
        </div>
    </div>
</div>

<script src="https://unpkg.com/imask"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        IMask(document.getElementById('cpf'), { mask: '000.000.000-00' });
    });
</script>
</body>
</html>
