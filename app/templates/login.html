<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ecossistema Saúde</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background-color: #f8faff; 
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .login-card { 
            border: none; 
            border-radius: 1rem; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
        }
        .brand-icon { 
            font-size: 3.5rem; 
            color: #0d6efd; 
        }
        .input-group-text {
            background-color: #fff;
        }
        .form-control:focus { 
            border-color: #0d6efd; 
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15); 
            border-left-color: #ced4da;
        }
        /* Efeito hover suave no botão */
        .btn-primary { transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3); }
    </style>
</head>
<body class="d-flex align-items-center py-4 bg-light min-vh-100">

<main class="w-100 m-auto">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
                
                <div class="text-center mb-4">
                    <a href="{{ url_for('site.index') }}" class="text-decoration-none">
                        <i class="fas fa-heartbeat brand-icon mb-3"></i>
                        <h3 class="fw-bold text-dark mb-1">Ecossistema Saúde</h3>
                    </a>
                    <p class="text-muted">Acesso seguro ao portal corporativo</p>
                </div>

                <div class="card login-card p-4 p-sm-5 bg-white">
                    
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} alert-dismissible fade show text-center small" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold text-secondary small text-uppercase">E-mail de Acesso</label>
                            <div class="input-group">
                                <span class="input-group-text border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                                <input type="email" class="form-control border-start-0 ps-0" id="email" name="email" placeholder="seu@email.com" required autofocus>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <div class="d-flex justify-content-between">
                                <label for="senha" class="form-label fw-bold text-secondary small text-uppercase">Senha</label>
                                <a href="#" class="text-decoration-none small text-muted">Esqueceu?</a>
                            </div>
                            <div class="input-group">
                                <span class="input-group-text border-end-0"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" class="form-control border-start-0 ps-0" id="senha" name="senha" placeholder="••••••••" required>
                            </div>
                        </div>

                        <button class="btn btn-primary w-100 py-2 fw-bold rounded-pill" type="submit">
                            Entrar no Portal <i class="fas fa-arrow-right ms-2"></i>
                        </button>
                    </form>
                </div>

                <div class="text-center mt-4 text-muted small">
                    <a href="{{ url_for('site.index') }}" class="text-muted text-decoration-none opacity-75 hover-white">
                        <i class="fas fa-arrow-left me-1"></i> Voltar para o site principal
                    </a>
                </div>

            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
