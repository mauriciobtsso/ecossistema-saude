<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ 'Editar' if usuario else 'Novo' }} Usuário - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="text-center mb-4">
                <a href="{{ url_for('admin.listar_usuarios') }}" class="text-decoration-none text-muted small">
                    <i class="fas fa-arrow-left me-1"></i> Voltar para a lista
                </a>
            </div>

            <div class="card shadow-lg border-0" style="border-radius: 15px;">
                <div class="card-header bg-dark text-white p-4 text-center" style="border-radius: 15px 15px 0 0;">
                    <i class="fas fa-user-shield fa-2x mb-2 text-primary"></i>
                    <h4 class="mb-0 fw-bold">{{ 'Editar Acesso' if usuario else 'Criar Novo Acesso' }}</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">E-mail (Login)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="fas fa-envelope text-muted"></i></span>
                                <input type="email" name="email" class="form-control" 
                                       value="{{ usuario.email if usuario else '' }}" required placeholder="exemplo@email.com">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                Senha {{ '(Deixe em branco para manter)' if usuario else 'Inicial' }}
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="fas fa-key text-muted"></i></span>
                                <input type="password" name="senha" class="form-control" 
                                       {{ 'required' if not usuario else '' }} placeholder="••••••••">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Nível de Permissão</label>
                            <select name="role" id="roleSelect" class="form-select" onchange="toggleEmpresa()">
                                <option value="cliente" {{ 'selected' if usuario and usuario.role == 'cliente' else '' }}>
                                    Empresa (Acesso ao Portal)
                                </option>
                                <option value="admin" {{ 'selected' if usuario and usuario.role == 'admin' else '' }}>
                                    Administrador (Acesso Total)
                                </option>
                            </select>
                        </div>

                        <div class="mb-4" id="empresaDiv" style="{{ 'display: none;' if usuario and usuario.role == 'admin' else 'display: block;' }}">
                            <label class="form-label fw-bold text-primary">Vincular à qual Empresa?</label>
                            <select name="empresa_id" class="form-select border-primary border-opacity-25">
                                <option value="">Selecione a empresa vinculada...</option>
                                {% for e in empresas %}
                                <option value="{{ e.id }}" {{ 'selected' if usuario and usuario.empresa_id == e.id else '' }}>
                                    {{ e.razao_social }}
                                </option>
                                {% endfor %}
                            </select>
                            <div class="form-text mt-2 small">
                                <i class="fas fa-info-circle me-1"></i> Usuários 'Cliente' só visualizam dados da empresa vinculada.
                            </div>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary py-2 fw-bold shadow-sm">
                                {{ 'Salvar Alterações' if usuario else 'Confirmar Cadastro' }}
                            </button>
                            <a href="{{ url_for('admin.listar_usuarios') }}" class="btn btn-light py-2">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Função para mostrar/esconder o campo de empresa dinamicamente
    function toggleEmpresa() {
        const role = document.getElementById('roleSelect').value;
        const div = document.getElementById('empresaDiv');
        
        if (role === 'admin') {
            div.style.display = 'none';
        } else {
            div.style.display = 'block';
        }
    }

    // Executa ao carregar a página para garantir o estado correto (importante para Edição)
    window.onload = toggleEmpresa;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
