<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ 'Editar' if empresa else 'Nova' }} Empresa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-bold">
            <i class="fas fa-building me-2"></i>Gestão de Contratos e Empresas
        </span>
    </div>
</nav>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="card border-0 shadow-sm" style="border-radius: 12px;">
                <div class="card-header bg-white py-3 border-bottom-0">
                    <h4 class="mb-0 fw-bold text-primary">{{ 'Editar Empresa' if empresa else 'Cadastrar Nova Empresa' }}</h4>
                </div>
                <div class="card-body p-4 pt-2">
                    <form method="POST">
                        
                        <h6 class="text-uppercase text-muted fw-bold mb-3 border-bottom pb-2 mt-2">Identificação</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <label class="form-label fw-bold">CNPJ * <small class="text-primary fw-normal">(Busca automática)</small></label>
                                <div class="input-group">
                                    <input type="text" name="cnpj" id="cnpj" class="form-control bg-light border-primary border-opacity-50" value="{{ empresa.cnpj if empresa else '' }}" required placeholder="00.000.000/0001-00" maxlength="18">
                                    <span class="input-group-text bg-white" id="cnpj-loading" style="display: none;">
                                        <i class="fas fa-spinner fa-spin text-primary"></i>
                                    </span>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Razão Social *</label>
                                <input type="text" name="razao_social" id="razao_social" class="form-control bg-light" value="{{ empresa.razao_social if empresa else '' }}" required placeholder="Ex: Pizza Leste Alimentos LTDA">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold text-primary">Nome Fantasia (Será o link)</label>
                                <input type="text" name="nome_fantasia" id="nome_fantasia" class="form-control bg-light border-primary border-opacity-25" value="{{ empresa.nome_fantasia if empresa else '' }}" placeholder="Ex: Pizza Leste">
                            </div>
                            
                            <div class="col-md-4">
                                <label class="form-label fw-bold">E-mail Financeiro/Contato</label>
                                <input type="email" name="email" id="email" class="form-control bg-light" value="{{ empresa.email if empresa else '' }}" placeholder="contato@empresa.com">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Telefone Principal</label>
                                <input type="text" name="telefone" id="telefone" class="form-control bg-light" value="{{ empresa.telefone if empresa else '' }}" placeholder="(00) 00000-0000" maxlength="15">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Nome do Responsável / RH</label>
                                <input type="text" name="responsavel" id="responsavel" class="form-control bg-light" value="{{ empresa.responsavel if empresa else '' }}" placeholder="Ex: Marcos Silva">
                            </div>
                        </div>

                        <h6 class="text-uppercase text-muted fw-bold mb-3 border-bottom pb-2">Endereço de Faturamento</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-3">
                                <label class="form-label fw-bold">CEP</label>
                                <div class="input-group">
                                    <input type="text" name="cep" id="cep" class="form-control bg-light" value="{{ empresa.cep if empresa else '' }}" placeholder="00000-000" maxlength="9">
                                    <span class="input-group-text bg-white" id="cep-loading" style="display: none;">
                                        <i class="fas fa-spinner fa-spin text-primary"></i>
                                    </span>
                                </div>
                            </div>
                            <div class="col-md-7">
                                <label class="form-label fw-bold">Logradouro (Rua/Av)</label>
                                <input type="text" name="logradouro" id="logradouro" class="form-control bg-light" value="{{ empresa.logradouro if empresa else '' }}">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label fw-bold">Número</label>
                                <input type="text" name="numero" id="numero" class="form-control bg-light" value="{{ empresa.numero if empresa else '' }}">
                            </div>
                            <div class="col-md-5">
                                <label class="form-label fw-bold">Complemento</label>
                                <input type="text" name="complemento" id="complemento" class="form-control bg-light" value="{{ empresa.complemento if empresa else '' }}" placeholder="Sala, Galpão, Bloco...">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Bairro</label>
                                <input type="text" name="bairro" id="bairro" class="form-control bg-light" value="{{ empresa.bairro if empresa else '' }}">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Cidade</label>
                                <input type="text" name="cidade" id="cidade" class="form-control bg-light" value="{{ empresa.cidade if empresa else '' }}">
                            </div>
                            <div class="col-md-1">
                                <label class="form-label fw-bold">UF</label>
                                <input type="text" name="estado" id="estado" class="form-control bg-light" maxlength="2" value="{{ empresa.estado if empresa else '' }}">
                            </div>
                        </div>

                        <h6 class="text-uppercase text-muted fw-bold mb-3 border-bottom pb-2">Regras Contratuais</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <label class="form-label fw-bold text-success">Valor por Vida (R$)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-success border-opacity-50 text-success fw-bold">R$</span>
                                    <input type="text" name="valor_por_vida" class="form-control border-success border-opacity-50 bg-light fw-bold" 
                                           value="{{ '{:.2f}'.format(empresa.valor_por_vida).replace('.', ',') if empresa else '50,00' }}">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold text-danger">Dia do Vencimento</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-danger border-opacity-50"><i class="far fa-calendar-alt text-danger"></i></span>
                                    <select name="dia_vencimento" class="form-select border-danger border-opacity-50 bg-light">
                                        {% for dia in [5, 10, 15, 20, 25] %}
                                        <option value="{{ dia }}" {{ 'selected' if empresa and empresa.dia_vencimento == dia else '' }}>Todo dia {{ dia }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-3 mt-5 pt-3 border-top">
                            <a href="{{ url_for('admin.listar_empresas') }}" class="btn btn-outline-secondary px-4 fw-bold">
                                <i class="fas fa-times me-2"></i>Cancelar
                            </a>
                            <button type="submit" class="btn btn-primary px-4 fw-bold shadow-sm">
                                <i class="fas fa-save me-2"></i>{{ 'Salvar Empresa' if empresa else 'Cadastrar Empresa' }}
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const cnpjInput = document.getElementById('cnpj');
    const telInput = document.getElementById('telefone');
    const cepInput = document.getElementById('cep');

    // ==========================================
    // 1. MÁSCARAS DE INPUT
    // ==========================================
    cnpjInput.addEventListener('input', function (e) {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length > 14) value = value.slice(0, 14);
        value = value.replace(/^(\d{2})(\d)/, '$1.$2');
        value = value.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
        value = value.replace(/\.(\d{3})(\d)/, '.$1/$2');
        value = value.replace(/(\d{4})(\d)/, '$1-$2');
        e.target.value = value;
    });

    telInput.addEventListener('input', function (e) {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length > 11) value = value.slice(0, 11);
        value = value.replace(/^(\d{2})(\d)/g, '($1) $2');
        value = value.replace(/(\d)(\d{4})$/, '$1-$2');
        e.target.value = value;
    });

    cepInput.addEventListener('input', function (e) {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length > 8) value = value.slice(0, 8);
        value = value.replace(/^(\d{5})(\d)/, '$1-$2');
        e.target.value = value;
    });

    // ==========================================
    // 2. BUSCA AUTOMÁTICA DE CNPJ (BrasilAPI)
    // ==========================================
    cnpjInput.addEventListener('blur', function() {
        let cnpj = this.value.replace(/\D/g, ''); 
        
        if (cnpj.length === 14) {
            document.getElementById('cnpj-loading').style.display = 'block';
            
            fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpj}`)
                .then(response => {
                    if (!response.ok) throw new Error('CNPJ não encontrado');
                    return response.json();
                })
                .then(data => {
                    document.getElementById('cnpj-loading').style.display = 'none';
                    
                    // Preenche Dados Básicos
                    document.getElementById('razao_social').value = data.razao_social || '';
                    document.getElementById('nome_fantasia').value = data.nome_fantasia || data.razao_social || '';
                    
                    // Tenta puxar o telefone e aplicar a máscara
                    let tel = data.ddd_telefone_1 || '';
                    if(tel) {
                        let v = tel.replace(/\D/g, '');
                        if (v.length <= 11) {
                            v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
                            v = v.replace(/(\d)(\d{4})$/, '$1-$2');
                            document.getElementById('telefone').value = v;
                        }
                    }

                    // Preenche Endereço
                    if(data.cep) {
                        document.getElementById('cep').value = data.cep.replace(/^(\d{5})(\d{3})$/, '$1-$2');
                    }
                    document.getElementById('logradouro').value = data.logradouro || '';
                    document.getElementById('numero').value = data.numero || '';
                    document.getElementById('complemento').value = data.complemento || '';
                    document.getElementById('bairro').value = data.bairro || '';
                    document.getElementById('cidade').value = data.municipio || '';
                    document.getElementById('estado').value = data.uf || '';
                    
                    // Joga o foco pro E-mail que geralmente não vem na API
                    document.getElementById('email').focus();
                })
                .catch(error => {
                    console.error('Erro:', error);
                    document.getElementById('cnpj-loading').style.display = 'none';
                });
        }
    });

    // ==========================================
    // 3. BUSCA AUTOMÁTICA VIA CEP (ViaCEP)
    // ==========================================
    cepInput.addEventListener('blur', function() {
        let cep = this.value.replace(/\D/g, ''); 
        
        // Só busca se o CNPJ não tiver preenchido os dados já (ou se o usuário apagar o logradouro)
        if (cep.length === 8 && !document.getElementById('logradouro').value) {
            document.getElementById('cep-loading').style.display = 'block';
            fetch(`https://viacep.com.br/ws/${cep}/json/`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('cep-loading').style.display = 'none';
                    if (!data.erro) {
                        document.getElementById('logradouro').value = data.logradouro;
                        document.getElementById('bairro').value = data.bairro;
                        document.getElementById('cidade').value = data.localidade;
                        document.getElementById('estado').value = data.uf;
                        document.getElementById('numero').focus();
                    }
                })
                .catch(error => {
                    console.error('Erro:', error);
                    document.getElementById('cep-loading').style.display = 'none';
                });
        }
    });
</script>

</body>
</html>
